name: Build packaged binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install runtime dependencies
        run: npm ci --prefix src

      - name: Build Windows installer
        run: npm run build-windows -- --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: dist/*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install runtime dependencies
        run: npm ci --prefix src

      - name: Build Linux AppImage
        run: npm run build-linux -- --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: Linux-AppImage
          path: dist/*.AppImage
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mapfile -t files < <(find release-artifacts -type f \( -name '*.exe' -o -name '*.AppImage' \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          title="eDEX Revival ${TAG_NAME}"
          prerelease_args=()
          if [[ "${TAG_NAME}" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "${TAG_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${files[@]}" --repo "${GH_REPO}" --clobber
          else
            gh release create "${TAG_NAME}" "${files[@]}" \
              --repo "${GH_REPO}" \
              --title "${title}" \
              --generate-notes \
              "${prerelease_args[@]}"
          fi
